const categories = [
  { id:'all', label:'全部', icon:'lucide:grid-3x3' },
  { id:'chat', label:'对话聊天', icon:'lucide:message-circle' },
  { id:'image', label:'AI绘画', icon:'lucide:image' },
  { id:'video', label:'AI视频', icon:'lucide:video' },
  { id:'code', label:'AI编程', icon:'lucide:code-2' },
  { id:'writing', label:'AI写作', icon:'lucide:pen-line' },
  { id:'music', label:'AI音乐', icon:'lucide:music' },
  { id:'search', label:'AI搜索', icon:'lucide:search' },
  { id:'office', label:'办公效率', icon:'lucide:briefcase' },
];

let activeCategory = 'all';
let searchQuery = '';

document.getElementById('footerCount').textContent = tools.length;

function renderTags() {
  document.getElementById('tagsContainer').innerHTML = categories.map(cat => `
    <button class="tag-btn shrink-0 flex items-center gap-1.5 px-3.5 py-2 rounded-lg border text-xs font-medium ${cat.id === activeCategory ? 'active' : 'border-neutral-800/50 bg-dark-200/30 text-neutral-500 hover:text-neutral-300 hover:border-neutral-600'}" data-cat="${cat.id}">
      <iconify-icon icon="${cat.icon}" width="13"></iconify-icon>
      ${cat.label}
    </button>`).join('');
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderTags();
      renderTools();
    });
  });
}

function renderTools() {
  let filtered = activeCategory === 'all' ? tools : tools.filter(t => t.category === activeCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => tag.toLowerCase().includes(q)));
  }
  document.getElementById('toolCount').textContent = filtered.length + ' 个工具';
  document.getElementById('toolsGrid').innerHTML = filtered.map(t => `
    <div class="tool-card fade-in group rounded-xl border border-neutral-800/60 bg-dark-200/40 p-5">
      <div class="flex items-start gap-3 mb-4">
        <div class="card-icon w-10 h-10 rounded-lg bg-dark-300/50 border border-neutral-700/40 flex items-center justify-center text-accent-400 shrink-0 transition-colors">
          <iconify-icon icon="${t.icon||'lucide:bot'}" width="18"></iconify-icon>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="text-[15px] font-semibold truncate">${t.name}</h3>
          <p class="text-[13px] text-neutral-500 mt-0.5 line-clamp-2">${t.desc}</p>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-1.5 flex-wrap">
          ${t.tags.slice(0,3).map(tag => `<span class="px-2 py-0.5 rounded text-[10px] bg-neutral-800/50 text-neutral-400">${tag}</span>`).join('')}
        </div>
        <a href="${t.url}" target="_blank" class="card-arrow flex items-center gap-1 text-[12px] font-medium text-accent-400">
          直达 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17L17 7M7 7h10v10"/></svg>
        </a>
      </div>
    </div>`).join('');
}


// ============================================================
//  文章渲染
// ============================================================
function renderArticles() {
  const container = document.getElementById('articlesGrid');
  const filtered = articles;
  container.innerHTML = filtered.map(a => `
    <a href="${a.url}" class="article-card group rounded-xl border border-neutral-800/60 bg-dark-200/40 p-5 block">
      <div class="flex items-start justify-between mb-3">
        <span class="px-2 py-0.5 rounded text-[10px] font-medium bg-accent-500/10 text-accent-400">${a.category==='chat'?'对话':a.category==='image'?'绘画':a.category==='code'?'编程':a.category==='video'?'视频':a.category==='office'?'办公':'通用'}</span>
        <span class="text-[11px] text-neutral-600">${a.date}</span>
      </div>
      <h3 class="text-[15px] font-semibold mb-2 leading-snug text-neutral-200">${a.title}</h3>
      <p class="text-[13px] text-neutral-500 leading-relaxed mb-4">${a.summary}</p>
      <div class="flex items-center gap-1 text-[12px] font-medium text-accent-400">
        阅读全文
        <svg class="art-arrow w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>
  `).join('');
}


renderTags();
renderTools();
renderArticles();

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderTools();
});

// 实际收录数
document.getElementById('headerToolCount').textContent = tools.length;

// 提交工具 (placeholder)
function showSubmit() {
  alert('提交工具功能即将上线！请先通过邮件联系我们。');
}
</script>
